<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --border-color: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88, 166, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88, 166, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* Glow effects */
    .glow-top {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(88, 166, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .glow-bottom {
      position: fixed;
      bottom: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(63, 185, 80, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Portal container */
    .portal {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px;
    }

    /* Logo */
    .portal-logo {
      margin-bottom: 32px;
      animation: fadeInDown 0.8s ease-out;
    }

    .portal-logo img {
      max-width: 360px;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 40px rgba(88, 166, 255, 0.15));
      transition: filter 0.3s ease;
    }

    .portal-logo img:hover {
      filter: drop-shadow(0 0 60px rgba(88, 166, 255, 0.25));
    }

    /* Title */
    .portal-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .portal-subtitle {
      font-size: 38px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    .portal-subtitle span {
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .portal-desc {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto 48px;
      line-height: 1.6;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    /* Version badge */
    .portal-version {
      display: inline-block;
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.2);
      color: var(--accent);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease-out 0.35s both;
    }

    /* Enter button */
    .portal-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, #1f6feb 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 24px rgba(88, 166, 255, 0.25);
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    .portal-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(88, 166, 255, 0.4);
      background: linear-gradient(135deg, var(--accent-hover) 0%, #388bfd 100%);
    }

    .portal-btn:active {
      transform: translateY(-1px);
    }

    .portal-btn svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease;
    }

    .portal-btn:hover svg {
      transform: translateX(4px);
    }

    /* Footer */
    .portal-footer {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.5;
      animation: fadeIn 1s ease-out 1s both;
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 0.5; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .portal { padding: 24px; }
      .portal-logo img { max-width: 260px; }
      .portal-subtitle { font-size: 28px; }
      .portal-btn { padding: 14px 36px; font-size: 15px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <div class="portal">
    <div class="portal-logo">
      <img src="{{ site.baseurl }}/style/LOGO2.png" alt="DevsBR Logo">
    </div>

    <div class="portal-title">Documentacao</div>
    <h1 class="portal-subtitle"><span>GameCP</span></h1>

    <div class="portal-version">v1.6.0</div>

    <p class="portal-desc">
      Painel de controle completo para servidores RF Online integrado ao WordPress. Tutoriais, guias e referencia de todos os modulos.
    </p>

    <a href="{{ site.baseurl }}/docs" class="portal-btn">
      Acessar Documentacao
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
      </svg>
    </a>
  </div>

  <div class="portal-footer">
    DevsBR &copy; 2026 — RF Online Control Panel
  </div>

</body>
</html>
